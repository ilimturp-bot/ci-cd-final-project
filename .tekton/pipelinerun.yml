apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: ci-cd-pipeline-run-
spec:
  serviceAccountName: pipeline
  pipelineRef:
    name: ci-cd-pipeline
  params:
    - name: app-name
      value: cd-app
    - name: git-url
      value: https://github.com/ilimturp-bot/ci-cd-final-project.git
    - name: git-revision
      value: main
    - name: build-image
      value: image-registry.openshift-image-registry.svc:5000/sn-labs-vbps271/cd-app:latest
  workspaces:
    - name: output
      persistentVolumeClaim:
        claimName: oc-lab-pvc